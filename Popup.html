<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <div class="pane-top">

    <!-- HEADER -->
    <div class="header">
      <div class="header-left">
        <div class="header-brand">note<span class="brand-accent">pad_</span></div>
        <div class="header-sub">capture · think · revise</div>
      </div>
      <div class="header-right">
        <div class="mode-pills">
          <button id="catAllBtn"   class="mode-pill active">All</button>
          <button id="catWorkBtn"  class="mode-pill" data-cat="work">Work</button>
          <button id="catIdeasBtn" class="mode-pill" data-cat="ideas">Ideas</button>
        </div>
        <button id="darkModeBtn" class="dark-toggle" title="Toggle theme">☀️</button>
      </div>
    </div>

    <!-- ACTION ROW — SVG icons, no emoji -->
    <div class="action-row">
      <button id="timelineBtn" class="act-btn" title="Today's timeline">
        <svg viewBox="0 0 20 20" fill="none"><rect x="3" y="4" width="14" height="13" rx="2" stroke="currentColor" stroke-width="1.4"/><path d="M7 2v4M13 2v4M3 8h14" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/><circle cx="7" cy="12" r="1" fill="currentColor"/><circle cx="10" cy="12" r="1" fill="currentColor"/><circle cx="13" cy="12" r="1" fill="currentColor"/></svg>
        <span>Today</span>
      </button>
      <button id="statsBtn" class="act-btn" title="Stats">
        <svg viewBox="0 0 20 20" fill="none"><path d="M4 14l4-4 3 3 5-6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/><circle cx="16" cy="7" r="1.5" fill="currentColor"/></svg>
        <span>Stats</span>
      </button>
      <button id="voiceBtn" class="act-btn" title="Voice input">
        <svg viewBox="0 0 20 20" fill="none"><rect x="7" y="2" width="6" height="9" rx="3" stroke="currentColor" stroke-width="1.4"/><path d="M4 10a6 6 0 0 0 12 0" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/><line x1="10" y1="16" x2="10" y2="18" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/><line x1="7" y1="18" x2="13" y2="18" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
        <span>Voice</span>
      </button>
      <button id="remindBtn" class="act-btn" title="Set reminder">
        <svg viewBox="0 0 20 20" fill="none"><path d="M10 2a6 6 0 0 1 6 6c0 3.5 1.5 5 1.5 5h-15S4 11.5 4 8a6 6 0 0 1 6-6Z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/><path d="M8 17a2 2 0 0 0 4 0" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
        <span>Remind</span>
      </button>
    </div>

    <!-- INPUT + SIDE BUTTONS ROW -->
    <div class="input-row">

    <!-- INPUT WRAP -->
    <div class="input-wrap">
      <select id="categorySelect" class="category-select">
        <option value="">No category</option>
        <option value="work">💼 Work</option>
        <option value="personal">🏠 Personal</option>
        <option value="research">🔬 Research</option>
        <option value="ideas">💡 Ideas</option>
      </select>
      <div class="fmt-toolbar" id="fmtToolbar">
        <button class="fmt-btn" data-fmt="bold"   title="Bold (**text**)" ><b>B</b></button>
        <button class="fmt-btn" data-fmt="italic" title="Italic (*text*)"><i>I</i></button>
        <button class="fmt-btn" data-fmt="code"   title="Inline code (`text`)" style="font-size:10px">&#96;&#96;</button>
        <div class="fmt-sep"></div>
        <button class="fmt-btn" data-fmt="olist"  title="Numbered list (1. 2. 3.)" style="font-size:10px">1.</button>
        <button class="fmt-btn" data-fmt="task"   title="Task checkbox (- [ ] text)" style="font-size:11px">☑</button>
        <button class="fmt-btn" data-fmt="bullet" title="Bullet point (- text)" style="font-size:15px">•</button>
        <div class="fmt-sep"></div>
        <button class="fmt-btn" data-fmt="h1"     title="Heading 1 (# text)" style="font-size:10px">H1</button>
        <button class="fmt-btn" data-fmt="h2"     title="Heading 2 (## text)" style="font-size:10px">H2</button>
        <button class="fmt-btn" data-fmt="strike" title="Strikethrough (~~text~~)" style="text-decoration:line-through">S</button>
        <div class="fmt-sep"></div>
        <!-- Templates inline -->
        <span class="template-label">T:</span>
        <button class="tpl-btn" data-tpl="meeting">Mtg</button>
        <button class="tpl-btn" data-tpl="bug">Bug</button>
        <button class="tpl-btn" data-tpl="standup">Stnd</button>
        <button class="tpl-btn" data-tpl="research">Res</button>
        <button class="tpl-btn" data-tpl="todo">Todo</button>
        <div class="fmt-sep"></div>
        <!-- Color swatches inline -->
        <button class="color-swatch" data-color=""      title="None"><span class="swatch-dot swatch-none"></span></button>
        <button class="color-swatch" data-color="rose"  title="Rose"><span class="swatch-dot" style="background:#f87171"></span></button>
        <button class="color-swatch" data-color="amber" title="Amber"><span class="swatch-dot" style="background:#fbbf24"></span></button>
        <button class="color-swatch" data-color="teal"  title="Teal"><span class="swatch-dot" style="background:#2dd4bf"></span></button>
        <button class="color-swatch" data-color="violet" title="Violet"><span class="swatch-dot" style="background:#a78bfa"></span></button>
        <button class="color-swatch" data-color="sky"   title="Sky"><span class="swatch-dot" style="background:#38bdf8"></span></button>
      </div>

      <textarea id="noteInput" placeholder="Capture a thought... (Ctrl+Enter to save)"></textarea>

      <!-- Save/Clear/Merge inside the box, bottom-center -->
      <div class="input-action-bar">
        <button id="saveBtn"  class="btn-save">Save_</button>
        <button id="clearBtn" class="btn-ghost">Clear</button>
        <button id="mergeBtn" class="btn-ghost btn-merge" title="Select 2+ notes then click to merge">
          Merge <span id="mergeBadge" class="merge-badge hidden">0</span>
        </button>
      </div>

      <div id="tagsSection" class="tags hidden">
        <span id="autoTags"></span>
      </div>
    </div><!-- /input-wrap -->

    </div><!-- /input-row -->

    <!-- MERGE PREVIEW BAR — shown when notes are selected -->
    <div id="mergeBar" class="merge-bar hidden">
      <span id="mergeBarLabel" class="merge-bar-label">0 selected</span>
      <div class="merge-bar-actions">
        <button id="mergeConfirmBtn" class="merge-bar-btn primary">⟳ Merge into one</button>
        <button id="mergeClearBtn"   class="merge-bar-btn ghost">✕ Clear</button>
      </div>
    </div>

    <!-- REMINDER PANEL -->
    <div id="remindPanel" class="remind-panel hidden">
      <div class="remind-header">
        <span class="remind-title">Set reminder</span>
        <button id="remindCloseBtn" class="remind-close">✕</button>
      </div>
      <div class="remind-body">
        <select id="remindNoteSelect" class="remind-select"></select>
        <div class="remind-time-row">
          <input type="datetime-local" id="remindTime" class="remind-time-input" />
        </div>
        <button id="remindSaveBtn" class="remind-save-btn">Set reminder</button>
      </div>
      <div id="remindList" class="remind-list"></div>
    </div>

    <!-- STATS PANEL -->
    <div id="statsPanel" class="stats-panel hidden">
      <div class="stats-row"><span>Today</span><span id="statToday">0</span></div>
      <div class="stats-row"><span>This week</span><span id="statWeek">0</span></div>
      <div class="stats-row"><span>Current streak</span><span id="statStreak">0</span></div>
      <div class="stats-row"><span>Best streak</span><span id="statBestStreak">0</span></div>
      <div class="stats-row"><span>Total notes</span><span id="statTotal">0</span></div>
    </div>

    </div><!-- end pane-top -->

    <!-- RESIZER -->
    <div id="resizer" class="resizer" title="Drag to resize">
      <div class="resizer-handle"></div>
    </div>

    <div class="pane-bottom">
    <!-- SEARCH + NAV HINT -->
    <div class="search-container">
      <input id="searchInput" placeholder="/ search notes..." />
      <div class="nav-hint" id="navHint">↑↓ navigate · Enter open · Del delete</div>
    </div>

    <!-- CATEGORY FILTER PILLS -->
    <div id="categoryFilters" class="cat-filter-row hidden"></div>

    <!-- TAG FILTER PILLS -->
    <div id="tagFilters" class="tag-filters hidden"></div>

    <!-- NOTES LIST -->
    <div id="notesList" class="notes-list hidden"></div>

    <!-- UNDO TOAST -->
    <div id="undoToast" class="undo-toast hidden">
      Note deleted. <button id="undoBtn">Undo</button>
    </div>

    </div><!-- end pane-bottom -->

  <!-- ═══════════════════════════════════════════════════
       INLINE PANELS — slide over the sidebar content
       ═══════════════════════════════════════════════════ -->

  <!-- PANEL: Today's Timeline -->
  <div id="panelTimeline" class="inline-panel hidden">
    <div class="panel-header">
      <div class="panel-title">
        <svg viewBox="0 0 20 20" fill="none" width="14" height="14"><rect x="3" y="4" width="14" height="13" rx="2" stroke="currentColor" stroke-width="1.4"/><path d="M7 2v4M13 2v4M3 8h14" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
        Today's timeline
      </div>
      <button class="panel-close" data-panel="panelTimeline">✕</button>
    </div>
    <div class="panel-sub" id="tlDateLabel"></div>
    <div class="panel-summary" id="tlSummary"></div>
    <div class="panel-scroll" id="tlList"></div>
  </div>

  <!-- PANEL: Voice Input -->
  <div id="panelVoice" class="inline-panel hidden">
    <div class="panel-header">
      <div class="panel-title">
        <svg viewBox="0 0 20 20" fill="none" width="14" height="14"><rect x="7" y="2" width="6" height="9" rx="3" stroke="currentColor" stroke-width="1.4"/><path d="M4 10a6 6 0 0 0 12 0" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/><line x1="10" y1="16" x2="10" y2="18" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/><line x1="7" y1="18" x2="13" y2="18" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
        Voice input
      </div>
      <button class="panel-close" data-panel="panelVoice">✕</button>
    </div>
    <div class="panel-body">
      <div class="voice-status" id="voiceStatus">
        <span class="voice-dot" id="voiceDot"></span>
        Click Start and speak
      </div>
      <textarea id="voiceText" class="voice-textarea" placeholder="Recognized text will appear here..."></textarea>
      <div class="voice-btn-row">
        <button id="voiceStartBtn" class="vbtn vbtn-start">Start</button>
        <button id="voiceStopBtn"  class="vbtn vbtn-stop">Stop</button>
        <button id="voiceUseBtn"   class="vbtn vbtn-use">Use in notepad</button>
      </div>
    </div>
  </div>

  <!-- PANEL: Note Detail / Edit -->
  <div id="panelNote" class="inline-panel hidden">
    <div class="panel-header">
      <div class="panel-title">
        <svg viewBox="0 0 20 20" fill="none" width="14" height="14"><path d="M5 4h10a1 1 0 0 1 1 1v11a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V5a1 1 0 0 1 1-1Z" stroke="currentColor" stroke-width="1.4"/><path d="M7 8h6M7 11h4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
        Note detail
      </div>
      <button class="panel-close" data-panel="panelNote">✕</button>
    </div>
    <div class="panel-body">
      <div id="noteDetailOrigin" class="note-detail-origin"></div>
      <div id="noteDetailTs" class="note-detail-ts"></div>
      <div class="fmt-toolbar note-detail-toolbar" id="noteDetailFmtToolbar">
        <button class="fmt-btn" data-fmt="bold"   title="Bold"><b>B</b></button>
        <button class="fmt-btn" data-fmt="italic" title="Italic"><i>I</i></button>
        <button class="fmt-btn" data-fmt="code"   title="Code" style="font-size:10px">&#96;&#96;</button>
        <div class="fmt-sep"></div>
        <button class="fmt-btn" data-fmt="olist"  title="Numbered list" style="font-size:10px">1.</button>
        <button class="fmt-btn" data-fmt="task"   title="Task" style="font-size:11px">☑</button>
        <button class="fmt-btn" data-fmt="bullet" title="Bullet" style="font-size:15px">•</button>
        <div class="fmt-sep"></div>
        <button class="fmt-btn" data-fmt="h1"     title="H1" style="font-size:10px">H1</button>
        <button class="fmt-btn" data-fmt="h2"     title="H2" style="font-size:10px">H2</button>
        <button class="fmt-btn" data-fmt="strike" title="Strike" style="text-decoration:line-through">S</button>
      </div>
      <textarea id="noteDetailEdit" class="note-detail-edit" spellcheck="false"></textarea>
      <div class="note-detail-btns">
        <button id="noteDetailSave"   class="nd-btn nd-save">Save_</button>
        <button id="noteDetailDelete" class="nd-btn nd-delete">Delete</button>
      </div>
    </div>
  </div>

  </div><!-- /container -->
  <script src="popup.js"></script>
</body>
</html>
