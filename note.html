<!DOCTYPE html>
<html>
<head>
  <script>
    (function() {
      var p = new URLSearchParams(location.search);
      if (p.get('theme') === 'light') document.documentElement.classList.add('light-mode');
    })();
  </script>
  <meta charset="utf-8">
  <title>Smart Notepad — Note</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    /* DARK (default) */
    html, body {
      width: 440px;
      font-family: 'DM Sans', system-ui, sans-serif;
      background: #0D0D14;
      color: #E8E6FF;
    }

    /* LIGHT */
    html.light-mode,
    html.light-mode body {
      background: #F5F0E8;
      color: #1A1A1A;
    }

    /* ── Header ── */
    .header {
      background: #0D0D14;
      padding: 13px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }
    html.light-mode .header {
      background: #1A1A1A;
      border-bottom-color: #333;
    }

    .brand {
      font-family: 'Syne', sans-serif;
      font-size: 16px;
      font-weight: 800;
      color: #fff;
      letter-spacing: -0.02em;
    }
    html.light-mode .brand {
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    .brand span { color: #7864FF; }
    html.light-mode .brand span { color: #C8B97A; }

    .header-right { display: flex; align-items: center; gap: 8px; }

    .header-label {
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: rgba(200,196,232,0.45);
    }
    html.light-mode .header-label { color: rgba(245,240,232,0.6); }

    #closeBtn {
      width: 22px;
      height: 22px;
      border-radius: 5px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.06);
      color: rgba(200,196,232,0.6);
      cursor: pointer;
      font-size: 11px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
    }
    #closeBtn:hover { background: rgba(239,68,68,0.2); color: #f87171; }
    html.light-mode #closeBtn {
      border-color: rgba(255,255,255,0.25);
      background: rgba(255,255,255,0.12);
      color: rgba(245,240,232,0.7);
    }

    /* ── Body ── */
    .body { padding: 14px 16px; }

    /* origin */
    #origin {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #9D8FFF;
      text-decoration: underline;
      text-underline-offset: 2px;
      cursor: pointer;
      margin-bottom: 3px;
      display: block;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    #origin:hover { color: #7864FF; }
    html.light-mode #origin { color: #7A6020; }
    html.light-mode #origin:hover { color: #C8B97A; }

    /* timestamp */
    #timestamp {
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.06em;
      color: rgba(200,196,232,0.4);
      margin-bottom: 12px;
    }
    html.light-mode #timestamp { color: #8A7F70; }

    /* ── Formatting Toolbar ── */
    .fmt-toolbar {
      display: flex;
      align-items: center;
      gap: 2px;
      padding: 5px 8px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      background: rgba(255,255,255,0.03);
      border-radius: 10px 10px 0 0;
      flex-wrap: wrap;
    }
    html.light-mode .fmt-toolbar {
      background: rgba(0,0,0,0.03);
      border-bottom-color: rgba(200,185,122,0.2);
    }
    .fmt-btn {
      width: 26px;
      height: 26px;
      border-radius: 5px;
      border: none;
      background: transparent;
      color: rgba(200,196,232,0.5);
      cursor: pointer;
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.12s, color 0.12s;
    }
    .fmt-btn:hover {
      background: rgba(120,100,255,0.15);
      color: #C4B8FF;
      transform: none;
    }
    html.light-mode .fmt-btn:hover {
      background: rgba(200,185,122,0.2);
      color: #7A6020;
    }
    .fmt-sep {
      width: 1px;
      height: 16px;
      background: rgba(255,255,255,0.08);
      margin: 0 3px;
    }
    html.light-mode .fmt-sep { background: rgba(0,0,0,0.1); }

    /* wrap textarea + toolbar together */
    .edit-wrap {
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      overflow: hidden;
      transition: border-color 0.15s;
    }
    .edit-wrap:focus-within {
      border-color: #7864FF;
      box-shadow: 0 0 0 1px rgba(120,100,255,0.3);
    }
    html.light-mode .edit-wrap {
      background: transparent;
      border: none;
      border-bottom: 1px solid #C8B97A;
      border-radius: 0;
    }
    html.light-mode .edit-wrap:focus-within {
      border-bottom-color: #1A1A1A;
      box-shadow: none;
    }

    /* textarea override — remove its own border since wrap handles it */
    #editArea {
      width: 100%;
      height: 200px;
      background: rgba(255,255,255,0.04);
      border: none;
      border-radius: 0;
      color: #E8E6FF;
      padding: 12px 14px;
      resize: none;
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      line-height: 1.6;
      outline: none;
    }
    html.light-mode #editArea {
      background: transparent;
      color: #1A1A1A;
    }

    /* buttons */
    .buttons {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }

    button {
      flex: 1;
      padding: 10px 0;
      border-radius: 6px;
      border: none;
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }
    button:hover { opacity: 0.85; transform: translateY(-1px); }

    #saveBtn {
      flex: 1.4;
      background: #7864FF;
      color: #fff;
      box-shadow: 0 4px 14px rgba(120,100,255,0.4);
    }
    html.light-mode #saveBtn {
      background: #1A1A1A;
      color: #F5F0E8;
      box-shadow: 0 4px 12px rgba(26,26,26,0.3);
    }

    #deleteBtn {
      background: rgba(239,68,68,0.12);
      color: #f87171;
      border: 1px solid rgba(239,68,68,0.28);
    }
    #deleteBtn:hover { opacity: 1; background: rgba(239,68,68,0.22); }
    html.light-mode #deleteBtn {
      background: rgba(200,60,60,0.08);
      color: #b91c1c;
      border-color: rgba(200,60,60,0.25);
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="brand">note<span>pad_</span></div>
    <div class="header-right">
      <div class="header-label">📝 note detail</div>
      <button id="closeBtn">✕</button>
    </div>
  </div>

  <div class="body">
    <div id="origin"></div>
    <div id="timestamp"></div>
    <div class="edit-wrap">
      <div class="fmt-toolbar" id="noteFmtToolbar">
        <button class="fmt-btn" data-fmt="bold"   title="Bold (**text**)"><b>B</b></button>
        <button class="fmt-btn" data-fmt="italic" title="Italic (*text*)"><i>I</i></button>
        <button class="fmt-btn" data-fmt="code"   title="Inline code (`text`)" style="font-size:10px">&#96;&#96;</button>
        <div class="fmt-sep"></div>
        <button class="fmt-btn" data-fmt="olist"  title="Numbered list (1. 2. 3.)" style="font-size:10px">1.</button>
        <button class="fmt-btn" data-fmt="task"   title="Task checkbox (- [ ] text)" style="font-size:11px">☑</button>
        <button class="fmt-btn" data-fmt="bullet" title="Bullet point (- text)" style="font-size:15px">•</button>
        <div class="fmt-sep"></div>
        <button class="fmt-btn" data-fmt="h1"     title="Heading 1" style="font-size:10px">H1</button>
        <button class="fmt-btn" data-fmt="h2"     title="Heading 2" style="font-size:10px">H2</button>
        <button class="fmt-btn" data-fmt="strike" title="Strikethrough (~~text~~)" style="text-decoration:line-through">S</button>
      </div>
      <textarea id="editArea" spellcheck="false" placeholder="Note content..."></textarea>
    </div>
    <div class="buttons">
      <button id="saveBtn">Save_</button>
      <button id="deleteBtn">Delete</button>
    </div>
  </div>

  <script src="note.js"></script>
</body>
</html>
