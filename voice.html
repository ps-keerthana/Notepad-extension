<!DOCTYPE html>
<html>
<head>
  <script>
    (function() {
      var p = new URLSearchParams(location.search);
      if (p.get('theme') === 'light') document.documentElement.classList.add('light-mode');
    })();
  </script>
  <meta charset="utf-8">
  <title>Smart Notepad — Voice</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    /* DARK (default) */
    html, body {
      width: 420px;
      font-family: 'DM Sans', system-ui, sans-serif;
      background: #0D0D14;
      color: #E8E6FF;
    }

    /* LIGHT */
    html.light-mode,
    html.light-mode body {
      background: #F5F0E8;
      color: #1A1A1A;
    }

    /* ── Header ── */
    .header {
      background: #0D0D14;
      padding: 13px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }
    html.light-mode .header {
      background: #1A1A1A;
      border-bottom-color: #333;
    }

    .brand {
      font-family: 'Syne', sans-serif;
      font-size: 16px;
      font-weight: 800;
      color: #fff;
      letter-spacing: -0.02em;
    }
    html.light-mode .brand {
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    .brand span { color: #7864FF; }
    html.light-mode .brand span { color: #C8B97A; }

    .header-label {
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: rgba(200,196,232,0.45);
    }
    html.light-mode .header-label { color: rgba(245,240,232,0.6); }

    /* ── Body ── */
    .body { padding: 16px; }

    /* status */
    #status {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: rgba(200,196,232,0.45);
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    html.light-mode #status { color: #8A7F70; }

    #status::before {
      content: '';
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(200,196,232,0.25);
      flex-shrink: 0;
    }
    #status.listening::before {
      background: #ef4444;
      box-shadow: 0 0 0 3px rgba(239,68,68,0.25);
      animation: pulse 1s ease-in-out infinite;
    }
    #status.done::before { background: #10b981; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* textarea */
    #text {
      width: 100%;
      height: 130px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      padding: 12px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 300;
      color: #E8E6FF;
      resize: none;
      outline: none;
      transition: border-color 0.15s;
      line-height: 1.6;
    }
    #text::placeholder { color: rgba(232,230,255,0.22); }
    #text:focus {
      border-color: rgba(120,100,255,0.45);
      box-shadow: 0 0 0 1px rgba(120,100,255,0.2);
    }

    html.light-mode #text {
      background: transparent;
      border: none;
      border-bottom: 1px solid #C8B97A;
      border-radius: 0;
      color: #1A1A1A;
      box-shadow: none;
    }
    html.light-mode #text::placeholder { color: #A89F90; }
    html.light-mode #text:focus {
      border-bottom-color: #1A1A1A;
      box-shadow: none;
    }

    /* buttons */
    .buttons {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }

    button {
      flex: 1;
      padding: 10px 0;
      border-radius: 6px;
      border: none;
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }
    button:hover { opacity: 0.85; transform: translateY(-1px); }

    #startBtn {
      background: #7864FF;
      color: #fff;
      box-shadow: 0 4px 14px rgba(120,100,255,0.4);
    }
    html.light-mode #startBtn {
      background: #1A1A1A;
      color: #F5F0E8;
      box-shadow: 0 4px 12px rgba(26,26,26,0.3);
    }

    #stopBtn {
      background: rgba(239,68,68,0.15);
      color: #f87171;
      border: 1px solid rgba(239,68,68,0.3);
    }
    html.light-mode #stopBtn {
      background: rgba(200,60,60,0.08);
      color: #b91c1c;
      border-color: rgba(200,60,60,0.25);
    }

    #useBtn {
      background: rgba(16,185,129,0.15);
      color: #34d399;
      border: 1px solid rgba(16,185,129,0.3);
    }
    html.light-mode #useBtn {
      background: rgba(16,120,60,0.1);
      color: #166534;
      border-color: rgba(16,120,60,0.25);
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="brand">note<span>pad_</span></div>
    <div class="header-label">🎤 voice input</div>
  </div>
  <div class="body">
    <div id="status">Click start and speak...</div>
    <textarea id="text" placeholder="Recognized text will appear here..."></textarea>
    <div class="buttons">
      <button id="startBtn">Start</button>
      <button id="stopBtn">Stop</button>
      <button id="useBtn">Use in Notepad</button>
    </div>
  </div>
  <script src="voice.js"></script>
</body>
</html>
