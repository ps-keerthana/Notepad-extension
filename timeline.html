<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Smart Notepad - Today</title>
  <style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 400px;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: radial-gradient(circle at top left, #e0f2ff 0, #ffffff 55%, #e5e7eb 100%);
    color: #0f172a;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
  }

  .card {
    width: 380px;
    padding: 14px 14px 10px;
    background: rgba(249,251,255,0.95);
    border-radius: 22px;
    box-shadow:
      0 22px 50px rgba(15,23,42,0.35),
      0 0 0 1px rgba(148,163,184,0.22);
    backdrop-filter: blur(16px);
  }

  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }

  .header-pill {
    padding: 6px 10px;
    border-radius: 999px;
    background: linear-gradient(135deg, #4f9cff, #a5b4fc);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .header-pill span {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: #f9fafb;
  }

  #closeBtn {
    border: none;
    background: rgba(255,255,255,0.95);
    color: #0f172a;
    border-radius: 999px;
    width: 24px;
    height: 24px;
    cursor: pointer;
    font-size: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 2px 6px rgba(15,23,42,0.25);
  }

  #dateLabel {
    font-size: 12px;
    opacity: 0.9;
    margin-bottom: 8px;
  }

  #timelineList {
    max-height: 290px;
    overflow-y: auto;
    padding-right: 4px;
  }

  .session-group {
    margin-bottom: 10px;
    padding: 8px 10px;
    border-radius: 14px;
    background: #ffffff;
    border: 1px solid #e5e7eb;
    box-shadow: 0 1px 4px rgba(15,23,42,0.08);
  }

  .session-header {
    font-size: 12px;
    font-weight: 600;
    margin-bottom: 4px;
    opacity: 0.95;
  }

  .timeline-item {
    font-size: 12px;
    margin: 2px 0;
    display: flex;
    justify-content: space-between;
    gap: 8px;
  }
  .timeline-time {
    opacity: 0.75;
    min-width: 60px;
  }
  .timeline-text {
    opacity: 0.95;
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  #summary {
    margin-top: 8px;
    font-size: 11px;
    opacity: 0.9;
    text-align: right;
  }
</style>


</head>
<body>
  <div class="card">
    <div class="header">
      <div class="header-pill">
        <span>📅 Today&#39;s timeline</span>
      </div>
      <button id="closeBtn">✕</button>
    </div>
    <div id="dateLabel"></div>
    <div id="timelineList"></div>
    <div id="summary"></div>
  </div>
  <script src="timeline.js"></script>
</body>


</html>
