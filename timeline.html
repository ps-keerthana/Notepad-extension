<!DOCTYPE html>
<html>
<head>
  <script>
    (function() {
      var p = new URLSearchParams(location.search);
      if (p.get('theme') === 'light') document.documentElement.classList.add('light-mode');
    })();
  </script>
  <meta charset="utf-8">
  <title>Smart Notepad — Today</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    /* DARK (default) */
    html, body {
      width: 440px;
      font-family: 'DM Sans', system-ui, sans-serif;
      background: #0D0D14;
      color: #E8E6FF;
    }

    /* LIGHT — triggered when html has .light-mode */
    html.light-mode,
    html.light-mode body {
      background: #F5F0E8;
      color: #1A1A1A;
    }

    /* ── Header ── */
    .header {
      background: #0D0D14;
      padding: 14px 16px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }
    html.light-mode .header {
      background: #1A1A1A;
      border-bottom-color: #333;
    }

    .brand {
      font-family: 'Syne', sans-serif;
      font-size: 16px;
      font-weight: 800;
      color: #fff;
      letter-spacing: -0.02em;
    }
    html.light-mode .brand {
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    .brand span { color: #7864FF; }
    html.light-mode .brand span { color: #C8B97A; }

    .header-right { display: flex; align-items: center; gap: 10px; }

    .header-label {
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: rgba(200,196,232,0.45);
    }
    html.light-mode .header-label { color: rgba(245,240,232,0.6); }

    #closeBtn {
      width: 22px;
      height: 22px;
      border-radius: 5px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.06);
      color: rgba(200,196,232,0.6);
      cursor: pointer;
      font-size: 11px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
    }
    #closeBtn:hover { background: rgba(239,68,68,0.2); color: #f87171; }
    html.light-mode #closeBtn {
      border-color: rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.1);
      color: rgba(245,240,232,0.7);
    }

    /* ── Date bar ── */
    .date-bar {
      padding: 10px 16px 8px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    html.light-mode .date-bar { border-bottom-color: #D8CFC0; }

    #dateLabel {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: rgba(200,196,232,0.5);
    }
    html.light-mode #dateLabel { color: #8A7F70; }

    #summary {
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.07em;
      color: #7864FF;
      text-transform: uppercase;
    }
    html.light-mode #summary { color: #7A6020; }

    /* ── Timeline list ── */
    #timelineList {
      max-height: 360px;
      overflow-y: auto;
      padding: 10px 16px 14px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    #timelineList::-webkit-scrollbar { width: 3px; }
    #timelineList::-webkit-scrollbar-thumb {
      background: rgba(120,100,255,0.3);
      border-radius: 999px;
    }
    html.light-mode #timelineList::-webkit-scrollbar-thumb { background: #C8B97A; }

    /* ── Session group ── */
    .session-group {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 10px;
      overflow: hidden;
    }
    html.light-mode .session-group {
      background: #EDE8DC;
      border-color: #D8CFC0;
    }

    .session-header {
      padding: 8px 12px 6px;
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #9D8FFF;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    html.light-mode .session-header {
      color: #7A6020;
      border-bottom-color: #D8CFC0;
    }

    /* ── Timeline row ── */
    .timeline-item {
      display: flex;
      align-items: baseline;
      gap: 10px;
      padding: 7px 12px;
      border-bottom: 1px solid rgba(255,255,255,0.03);
      transition: background 0.1s;
    }
    .timeline-item:last-child { border-bottom: none; }
    .timeline-item:hover { background: rgba(120,100,255,0.06); }
    html.light-mode .timeline-item { border-bottom-color: rgba(200,185,122,0.15); }
    html.light-mode .timeline-item:hover { background: rgba(200,185,122,0.15); }

    .timeline-time {
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      color: rgba(200,196,232,0.4);
      min-width: 52px;
      flex-shrink: 0;
      letter-spacing: 0.05em;
    }
    html.light-mode .timeline-time { color: #A89F90; }

    .timeline-text {
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      font-weight: 300;
      color: #C8C4E8;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    html.light-mode .timeline-text { color: #2A2520; font-weight: 400; }

    /* empty state */
    .empty {
      padding: 32px 16px;
      text-align: center;
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: rgba(200,196,232,0.25);
    }
    html.light-mode .empty { color: #A89F90; }
  </style>
</head>
<body>
  <div class="header">
    <div class="brand">note<span>pad_</span></div>
    <div class="header-right">
      <div class="header-label">📅 today's timeline</div>
      <button id="closeBtn">✕</button>
    </div>
  </div>

  <div class="date-bar">
    <div id="dateLabel"></div>
    <div id="summary"></div>
  </div>

  <div id="timelineList"></div>

  <script src="timeline.js"></script>
</body>
</html>
